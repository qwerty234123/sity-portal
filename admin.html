<html lang="en">
<head>

<link rel="stylesheet" href="style.css">
<link href="z.js">

<link href="https://fonts.googleapis.com/css2? family=Kadwa&display=swap" rel="stylesheet">
<title>Городской портал</title>
</head>
<body>
<header class="header">
<div class="logo">
<div class="logo-fotos">
<img src="img/image 1.png" alt="logo" class="logo-foto">
<h2 class="logo-text">Сделаем мир лучше!</h2>
</div>
<ul class="hd">
<li class="head-text"><a href="#" class="a">Главная</a></li>
<li class="head-text1"><a href="#" class="a">Выход</a></li>
</ul>
</div>
</header>
<section class="input-2">
    <div class="admin-pole">
        <div class="left-pole">
        </div>
        <div class="center-pole">
            <div class="top-left-text">
                <div class="top-menu">
                    <button class="add-user">+ Добавить пользователя</button>
                        <p class="list-user">Список ваших пользователей.</p>
                    <div class="list-user-2">
                        <p class="watch">Показать</p>
                        <select name="list" class="number-pole">
                            <option class="number">1</option>
                            <option class="number">2</option>
                        </select>
                        <p class="watch">записей</p>
                    </div>   
                </div>
                <form class="search-poles" method="get">
                    <input name="s" type="search" class="search-pole">
                    <button type="submit" class="search">Поиск</button>
                </form>
                
            </div>
            <div>
                <div class="info-pole-1">
                    <p class="n">№</p>
                    <p class="info-user">Пользователь</p>
                    <p class="info-application">Заявки пользователей</p>
                    <p class="info-change">Смена пароля</p>
                    <p class="delete">Удаление</p>
                </div>
                <div class="info-pole-2">
                    <p class="n-2">1.</p>
                    <p class="info-user-2"><img src="img/user.png" class="img-user">user456890</p>
                    <p class="info-application-2"><img src="img/application.png" class="img-application"></p>
                    <p class="info-change-2"><img src="img/change.png" class="img-change"></p>
                    <p class="delete-2"><img src="img/delete.png" class="img-delete"></p>
                </div>
                <div class="info-pole-3">
                    <p class="n-2">2.</p>
                    <p class="info-user-2"><img src="img/user.png" class="img-user">loginpage45</p>
                    <p class="info-application-2"><img src="img/application.png" class="img-application"></p>
                    <p class="info-change-2"><img src="img/change.png" class="img-change"></p>
                    <p class="delete-2"><img src="img/delete.png" class="img-delete"></p>
                </div>
            </div>
            <div class="bottom-pole">
                <p class="number-user">Всего пользователей: 2</p>
                <button class="previous-button">предыдущая</button>
                <button class="next-button">следующая</button>
            </div>
        </div>
        

    </div>
</section>
